<!DOCTYPE html>  <!--HTMLの宣言-->
<html lang="ja"> <!--日本語-->
<head>
    <meta charset="UTF-8"> <!--文字エンコーディング-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
    <title>今日の運勢アドバイス</title>  <!--タイトル-->
</head>
<body>
      <h1>今日の運勢アドバイス</h1>
  <p>ページを更新するたびにサイコロが振られます</p>
  <p id="game-result">ここに結果が出ます</p>
  <p><a href="index.html">トップに戻る</a></p>
    <script>
// 1〜6 のサイコロを 1 回だけ振る
const dice = Math.floor(Math.random() * 6) + 1;

// 出目で「今日のおすすめ行動」を分岐
let advice;
if (dice >= 5) {
  advice = "机を片付けて気持ちをリセット";
} else if (dice >= 3) {
  advice = "コップ1杯の水を飲んでひと息";
} else {
  advice = "深呼吸を3回してから次の作業へ";
}

// サイコロを 1 回振る（第8回・第9回で書いた）
const dice1 = Math.floor(Math.random() * 6) + 1;
console.log("1 回目:", dice1);

// もう 1 回振りたい
const dice2 = Math.floor(Math.random() * 6) + 1;
console.log("2 回目:", dice2);

// さらにもう 1 回（合計 3 回）
const dice3 = Math.floor(Math.random() * 6) + 1;
console.log("3 回目:", dice3);
// 結果を画面に表示
const message = ` ${dice} が出ました！→ ${advice}`;
document.getElementById("game-result").textContent = message;
console.log(message);
    </script>
</body>
</html>
