<!DOCTYPE html>  <!--HTMLの宣言-->
<html lang="ja"> <!--日本語-->
<head>
    <meta charset="UTF-8"> <!--文字エンコーディング-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
    <title>自己紹介ページ</title>  <!--タイトル-->
</head>
<body>
    <h1>笠松瑛太</h1> <!--大見出し-->
    <p>初めてHTMLを書いています。感謝しています。</p>
    <h2>趣味</h2> <!--中見出し-->
    <p >漫画 パソコン</p>

    <h2>今日の運勢</h2>
<p id="fortune">ここに結果が出ます</p>

    <h2>気分スコア診断</h2>
<p>今日の気分を 0〜10 の数値で mood 変数に書いて更新してください</p>
<p id="result">ここに診断結果が出ます</p>
    <script>
        // おみくじの候補リスト（順番に意味はない）
const fortunes = ["大吉", "中吉", "小吉", "末吉", "凶"];
// 0以上 配列長未満 の整数をランダムに作る
const index = Math.floor(Math.random() * fortunes.length);

const mood = 7;  // 0〜10 で気分を表す数値
const result   = fortunes[index];
console.log(result);

// HTML の id="fortune" の要素を取り出して中身を書き換える
document.getElementById("fortune").textContent = result;

// 気分スコア診断
let message;

if (mood >= 9) {
  message = "絶好調！その勢いを大切に";
} else if (mood >= 6) {
  message = "いい感じ。今日もがんばろう";
} else if (mood >= 3) {
  message = "ぼちぼち。無理せずいこう";
} else {
  message = "お疲れさま。今日はゆっくり休もう";
}

console.log(message);
document.getElementById("result").textContent = message;

    </script>
</body>
</html>
